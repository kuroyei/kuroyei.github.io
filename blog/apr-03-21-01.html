        <img src="apr-03-21-01-files/1.png">
        <p>これは長方形を折り返した図形。<br>
        DA//BCだから∠BAD=x<br>
        折り返した図形だから∠BAD=∠BAC=x<br>
        ∠ACB=20°(錯覚)より∠ACD=160°<br>
        よって2x=160° x=80°<br><br>
        「折り返した角は等しい」これをすぐに思い浮かべられなかった。
        </p>
